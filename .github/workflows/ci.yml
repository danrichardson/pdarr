name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Go vet
        run: go vet $(go list ./... | grep -v /frontend/)

      - name: Unit tests
        run: go test $(go list ./... | grep -v /frontend/)

      - name: Integration tests
        run: go test -tags integration -v $(go list ./... | grep -v /frontend/)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: cd frontend && npm ci && npm run build

      - name: Verify Go binary builds with embedded frontend
        run: go build ./cmd/pdarr/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: gosec
        uses: securego/gosec@master
        with:
          args: '-exclude-dir=frontend $(go list ./... | grep -v /frontend/)'
