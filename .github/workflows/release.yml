name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOFLAGS="-trimpath -ldflags=-s -w"
          GOOS=linux  GOARCH=amd64 go build $GOFLAGS -o dist/sqzarr-linux-amd64  ./cmd/sqzarr/
          GOOS=darwin GOARCH=arm64 go build $GOFLAGS -o dist/sqzarr-darwin-arm64 ./cmd/sqzarr/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
